name: Build Password Generator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed \
          --name password-generator \
          --add-data "/usr/lib/python3.11/tkinter:tkinter" \
          password_generator.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: password-generator-linux
        path: dist/password-generator
        
    # Опционально: собрать для Windows тоже
    - name: Build for Windows
      run: |
        pyinstaller --onefile --windowed \
          --name password-generator.exe \
          password_generator.py
      if: false  # Пока отключено, раскомментируйте если нужно
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: password-generator-windows
        path: dist/password-generator.exe
      if: false  # Пока отключено
